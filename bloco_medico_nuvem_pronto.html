
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bloco Médico de Plantão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#eef2f5;
}

header{
background:#1f2d3d;
color:white;
padding:16px;
font-size:22px;
}

#tabs{
display:flex;
flex-wrap:wrap;
background:#2c3e50;
}

.tab{
padding:10px 16px;
color:white;
cursor:pointer;
}

.tab.active{
background:#16a085;
}

.section{
display:none;
padding:20px;
}

.section.active{
display:block;
}

textarea,input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:150px;
}

button{
margin-top:10px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#16a085;
color:white;
cursor:pointer;
}

button:hover{
background:#13856b;
}

.card{
background:white;
padding:12px;
border-radius:6px;
margin-top:10px;
border:1px solid #ddd;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
}

.modal{
background:white;
padding:20px;
border-radius:8px;
max-width:650px;
width:90%;
max-height:80%;
overflow:auto;
}

pre{
white-space:pre-wrap;
font-family:inherit;
user-select:text;
cursor:text;
}
</style>
</head>

<body>

<header>Bloco Médico de Plantão</header>

<div id="tabs">
<div class="tab active" onclick="openTab('anamnese',event)">Anamnese</div>
<div class="tab" onclick="openTab('hipotese',event)">Hipótese</div>
<div class="tab" onclick="openTab('exames',event)">Exames</div>
<div class="tab" onclick="openTab('prescricao',event)">Prescrição</div>
<div class="tab" onclick="openTab('conduta',event)">Conduta</div>
<div class="tab" onclick="openTab('protocolos',event)">Protocolos</div>
<div class="tab" onclick="openTab('pesquisa',event)">Pesquisa</div>
</div>

<div id="anamnese" class="section active">
<h3>Anamnese</h3>
<textarea></textarea>
</div>

<div id="hipotese" class="section">
<h3>Hipótese diagnóstica</h3>
<textarea></textarea>
</div>

<div id="exames" class="section">
<h3>Exames</h3>
<textarea></textarea>
</div>

<div id="prescricao" class="section">
<h3>Prescrição</h3>
<textarea></textarea>
</div>

<div id="conduta" class="section">
<h3>Conduta</h3>
<textarea></textarea>
</div>

<div id="protocolos" class="section">

<h3>Criar protocolo</h3>

<input id="nomeProtocolo" placeholder="Nome do protocolo">

<textarea id="textoProtocolo" placeholder="Digite o protocolo"></textarea>

<button onclick="salvarProtocolo()">Salvar protocolo</button>

<h3>Biblioteca de protocolos</h3>
<div id="listaProtocolos"></div>

</div>

<div id="pesquisa" class="section">

<h3>Pesquisa</h3>

<input id="campoPesquisa" placeholder="Pesquisar..." onkeyup="pesquisarTexto()">

<div id="resultadoPesquisa"></div>

</div>

<script>

const SUPABASE_URL =https://bbzeplwnibtftdxxrwjw.supabase.co ;
const SUPABASE_KEY =eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiemVwbHduaWJ0ZnRkeHhyd2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTE1NDcsImV4cCI6MjA4ODY4NzU0N30.XuB07ByCS7dxGomdCh-8UR1pMYq69m0SdKmA7EhZYOA;

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let biblioteca = [];

function openTab(id,evt){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
evt.target.classList.add("active");
document.getElementById(id).classList.add("active");
}

async function salvarProtocolo(){

let nome=document.getElementById("nomeProtocolo").value.trim();
let texto=document.getElementById("textoProtocolo").value.trim();

if(!nome || !texto){
alert("Preencha nome e protocolo");
return;
}

await client.from("protocolos").insert([{nome:nome,texto:texto}]);

document.getElementById("nomeProtocolo").value="";
document.getElementById("textoProtocolo").value="";

carregarProtocolos();

}

async function carregarProtocolos(){

let {data}=await client
.from("protocolos")
.select("*")
.order("id",{ascending:false});

biblioteca=data || [];

renderProtocolos();

}

function renderProtocolos(){

let lista=document.getElementById("listaProtocolos");
lista.innerHTML="";

biblioteca.forEach((p,i)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.nome}</b><br><br>
<button onclick="verProtocolo(${i})">Ver</button>
<button onclick="copiar(${i})">Copiar</button>
<button onclick="inserirConduta(${i})">Conduta</button>
<button onclick="inserirPrescricao(${i})">Prescrição</button>
<button onclick="excluir(${i})">Excluir</button>
`;

lista.appendChild(div);

});

}

function verProtocolo(i){

let p=biblioteca[i];

let overlay=document.createElement("div");
overlay.className="overlay";

overlay.innerHTML=`
<div class="modal">
<h3>${p.nome}</h3>
<pre>${p.texto}</pre>
<button onclick="copiar(${i})">Copiar</button>
<button onclick="document.body.removeChild(this.closest('.overlay'))">Fechar</button>
</div>
`;

document.body.appendChild(overlay);
}

function copiar(i){
navigator.clipboard.writeText(biblioteca[i].texto);
alert("Protocolo copiado");
}

async function excluir(i){

let id=biblioteca[i].id;

await client.from("protocolos").delete().eq("id",id);

carregarProtocolos();

}

function inserirConduta(i){
let campo=document.querySelector("#conduta textarea");
campo.value+="\n"+biblioteca[i].texto;
}

function inserirPrescricao(i){
let campo=document.querySelector("#prescricao textarea");
campo.value+="\n"+biblioteca[i].texto;
}

function pesquisarTexto(){

let termo=document.getElementById("campoPesquisa").value.toLowerCase();
let resultado=document.getElementById("resultadoPesquisa");
resultado.innerHTML="";

if(termo.length<2) return;

biblioteca.forEach((p,i)=>{

if(p.nome.toLowerCase().includes(termo) || p.texto.toLowerCase().includes(termo)){

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.nome}</b>
<pre>${p.texto}</pre>
<button onclick="verProtocolo(${i})">Abrir protocolo</button>
`;

resultado.appendChild(div);

}

});

}

window.onload = carregarProtocolos;

</script>

</body>
</html>
